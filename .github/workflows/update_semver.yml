name: Update Semver

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: semver-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  update-semver-if-merged:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          persist-credentials: false

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Calculate next version
        id: version
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [[ -z "$LAST_TAG" ]]; then
            MAJOR=0
            MINOR=0
            PATCH=0
            echo "No existing semver tag found. Starting from v0.0.0"
          else
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            echo "Last tag: $LAST_TAG"
          fi

          BUMP="patch"
          if [[ "$PR_TITLE" =~ \(MAJOR\) ]] || [[ "${PR_BODY:-}" =~ \(MAJOR\) ]]; then
            BUMP="major"
          elif [[ "$PR_TITLE" =~ \(MINOR\) ]] || [[ "${PR_BODY:-}" =~ \(MINOR\) ]]; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

          echo "Resolved bump: $BUMP"
          echo "Next tag: $NEW_TAG"

      - name: Skip if tag already exists
        id: tag_check
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists locally: $TAG"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists on remote: $TAG"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.tag_check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag -a "${{ steps.version.outputs.tag }}" "${{ github.event.pull_request.merge_commit_sha }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push tag
        if: steps.tag_check.outputs.exists != 'true'
        shell: bash
        env:
          PAT_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          if [[ -z "${PAT_TOKEN}" ]]; then
            echo "::error::PAT_TOKEN secret is not configured."
            exit 1
          fi

          git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" "refs/tags/${{ steps.version.outputs.tag }}"
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail

          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="none"
          fi

          {
            if [[ "${{ steps.tag_check.outputs.exists }}" == "true" ]]; then
              echo "## Semver update skipped"
              echo ""
              echo "- Tag already exists: \`${{ steps.version.outputs.tag }}\`"
            else
              echo "## Semver update complete"
              echo ""
              echo "- Previous tag: \`${LAST_TAG}\`"
              echo "- Bump: \`${{ steps.version.outputs.bump }}\`"
              echo "- New tag: \`${{ steps.version.outputs.tag }}\`"
              echo "- Release notes: generated automatically"
            fi
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Merge commit: \`${{ github.event.pull_request.merge_commit_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
