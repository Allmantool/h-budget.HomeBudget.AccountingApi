name: Update Semver

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: semver-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  update-semver-if-merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Calculate semantic version
        id: semver
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          search_commit_body: true
          bump_each_commit: false
          version_from_branch: false

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail

          TAG="${{ steps.semver.outputs.version_tag }}"

          if [[ -z "$TAG" ]]; then
            echo "semantic-version did not produce version_tag"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Ensure tag does not already exist
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on remote: $TAG"
            exit 1
          fi

      - name: Create annotated tag
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"

          git tag -a "$TAG" "$SHA" -m "Release $TAG"

      - name: Push tag
        run: |
          set -euo pipefail
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Summary
        run: |
          echo "Created tag: ${{ steps.tag.outputs.tag }}"
