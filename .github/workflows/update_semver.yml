name: Update Semver

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: semver-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  update-semver-if-merged:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Calculate semantic version
        id: semver
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          search_commit_body: true
          bump_each_commit: false
          version_from_branch: false

      - name: Summary for already tagged commit
        if: steps.semver.outputs.is_tagged == 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Semver update skipped"
            echo ""
            echo "- Existing tag: \`${{ steps.semver.outputs.version_tag }}\`"
            echo "- Reason: merge commit is already tagged"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Merge commit: \`${{ github.event.pull_request.merge_commit_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve tag
        if: steps.semver.outputs.is_tagged != 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.semver.outputs.version_tag }}"

          if [[ -z "$TAG" ]]; then
            echo "semantic-version did not produce version_tag"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Ensure tag does not already exist
        if: steps.semver.outputs.is_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on remote: $TAG"
            exit 1
          fi

      - name: Create annotated tag
        if: steps.semver.outputs.is_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"

          git tag -a "$TAG" "$SHA" -m "Release $TAG"

      - name: Push tag
        if: steps.semver.outputs.is_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.semver.outputs.is_tagged != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: Release ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

      - name: Summary
        if: steps.semver.outputs.is_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Semver update complete"
            echo ""
            echo "- Tag: \`${{ steps.tag.outputs.tag }}\`"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Merge commit: \`${{ github.event.pull_request.merge_commit_sha }}\`"
            echo "- Release: auto-generated notes published"
          } >> "$GITHUB_STEP_SUMMARY"
