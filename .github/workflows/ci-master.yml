name: CI Master

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-master-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: Allmantool_h-budget-accounting
  SONAR_PROJECT_NAME: h-budget-accounting
  SONAR_GITHUB_REPOSITORY: Allmantool/h-budget.HomeBudget.AccountingApi

jobs:
  determine-sonar-mode:
    name: Determine Sonar Mode
    runs-on: ubuntu-latest
    outputs:
      sonar_enabled: ${{ steps.mode.outputs.sonar_enabled }}
      sonar_reason: ${{ steps.mode.outputs.sonar_reason }}
    steps:
      - name: Resolve Sonar availability
        id: mode
        shell: bash
        run: |
          if [[ -n "${SONAR_TOKEN:-}" ]]; then
            echo "sonar_enabled=true" >> "$GITHUB_OUTPUT"
            echo "sonar_reason=SONAR_TOKEN is configured." >> "$GITHUB_OUTPUT"
          else
            echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
            echo "sonar_reason=SONAR_TOKEN is missing; CI will run without Sonar publishing." >> "$GITHUB_OUTPUT"
          fi

  validate-application-build:
    name: Validate Application Build
    runs-on: ubuntu-latest
    outputs:
      restore_outcome: ${{ steps.collect-status.outputs.restore_outcome }}
      build_outcome: ${{ steps.collect-status.outputs.build_outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore .NET packages
        id: restore
        run: dotnet restore HomeBudgetAccountingApi.sln

      - name: Build solution
        id: build
        run: dotnet build HomeBudgetAccountingApi.sln --configuration Release --no-restore --no-incremental

      - name: Collect step outcomes
        id: collect-status
        if: ${{ always() }}
        env:
          RESTORE_OUTCOME: ${{ steps.restore.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        shell: bash
        run: |
          echo "restore_outcome=${RESTORE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "build_outcome=${BUILD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"

  run-unit-and-component-tests:
    name: Run Unit And Component Tests
    runs-on: ubuntu-latest
    needs: validate-application-build
    outputs:
      tests_outcome: ${{ steps.collect-status.outputs.tests_outcome }}
      diagnostics_upload_outcome: ${{ steps.collect-status.outputs.diagnostics_upload_outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore .NET packages
        run: dotnet restore HomeBudgetAccountingApi.sln

      - name: Build solution
        run: dotnet build HomeBudgetAccountingApi.sln --configuration Release --no-restore --no-incremental

      - name: Run unit and component tests with coverage
        id: run-tests
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/unit

          dotnet test HomeBudget.Accounting.Api.Tests/HomeBudget.Accounting.Api.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Accounting.Api.Tests.trx" \
            --results-directory test-results/unit/HomeBudget.Accounting.Api.Tests

          dotnet test HomeBudget.Components.Categories.Tests/HomeBudget.Components.Categories.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Components.Categories.Tests.trx" \
            --results-directory test-results/unit/HomeBudget.Components.Categories.Tests

          dotnet test HomeBudget.Components.Operations.Tests/HomeBudget.Components.Operations.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Components.Operations.Tests.trx" \
            --results-directory test-results/unit/HomeBudget.Components.Operations.Tests

      - name: Upload unit and component test diagnostics
        id: upload-diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: ci-unit-test-results
          path: test-results/unit/
          if-no-files-found: warn
          retention-days: 14

      - name: Collect step outcomes
        id: collect-status
        if: ${{ always() }}
        env:
          TESTS_OUTCOME: ${{ steps.run-tests.outcome }}
          DIAGNOSTICS_UPLOAD_OUTCOME: ${{ steps.upload-diagnostics.outcome }}
        shell: bash
        run: |
          echo "tests_outcome=${TESTS_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "diagnostics_upload_outcome=${DIAGNOSTICS_UPLOAD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"

  run-api-integration-tests:
    name: Run API Integration Tests
    runs-on: ubuntu-latest
    needs: validate-application-build
    outputs:
      tests_outcome: ${{ steps.collect-status.outputs.tests_outcome }}
      diagnostics_upload_outcome: ${{ steps.collect-status.outputs.diagnostics_upload_outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore .NET packages
        run: dotnet restore HomeBudgetAccountingApi.sln

      - name: Build solution
        run: dotnet build HomeBudgetAccountingApi.sln --configuration Release --no-restore --no-incremental

      - name: Prepare Docker host for integration tests
        shell: bash
        run: |
          docker system prune -af || true
          docker network prune -f || true

      - name: Run integration tests with coverage
        id: run-tests
        timeout-minutes: 35
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/integration

          dotnet test HomeBudget.Accounting.Api.IntegrationTests/HomeBudget.Accounting.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Accounting.Api.IntegrationTests.trx" \
            --results-directory test-results/integration/HomeBudget.Accounting.Api.IntegrationTests

      - name: Upload integration test diagnostics
        id: upload-diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: ci-integration-test-results
          path: test-results/integration/
          if-no-files-found: warn
          retention-days: 14

      - name: Collect step outcomes
        id: collect-status
        if: ${{ always() }}
        env:
          TESTS_OUTCOME: ${{ steps.run-tests.outcome }}
          DIAGNOSTICS_UPLOAD_OUTCOME: ${{ steps.upload-diagnostics.outcome }}
        shell: bash
        run: |
          echo "tests_outcome=${TESTS_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "diagnostics_upload_outcome=${DIAGNOSTICS_UPLOAD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"

  analyze-master-quality:
    name: Analyze Master Quality
    runs-on: ubuntu-latest
    needs:
      - determine-sonar-mode
      - validate-application-build
      - run-unit-and-component-tests
      - run-api-integration-tests
    if: ${{ always() && needs.validate-application-build.result == 'success' && needs.run-unit-and-component-tests.result == 'success' && needs.run-api-integration-tests.result == 'success' }}
    outputs:
      api_merge_outcome: ${{ steps.collect-status.outputs.api_merge_outcome }}
      workers_merge_outcome: ${{ steps.collect-status.outputs.workers_merge_outcome }}
      final_merge_outcome: ${{ steps.collect-status.outputs.final_merge_outcome }}
      opencover_inputs_exist: ${{ steps.collect-status.outputs.opencover_inputs_exist }}
      cobertura_report_exists: ${{ steps.collect-status.outputs.cobertura_report_exists }}
      diagnostics_upload_outcome: ${{ steps.collect-status.outputs.diagnostics_upload_outcome }}
      sonar_begin_outcome: ${{ steps.collect-status.outputs.sonar_begin_outcome }}
      sonar_build_outcome: ${{ steps.collect-status.outputs.sonar_build_outcome }}
      sonar_end_outcome: ${{ steps.collect-status.outputs.sonar_end_outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download unit and component test diagnostics
        uses: actions/download-artifact@v5
        with:
          name: ci-unit-test-results
          path: artifacts/unit

      - name: Download integration test diagnostics
        uses: actions/download-artifact@v5
        with:
          name: ci-integration-test-results
          path: artifacts/integration

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install coverage tooling
        shell: bash
        run: |
          dotnet tool update --global dotnet-reportgenerator-globaltool --version 5.5.1 || \
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.1

      - name: Install SonarScanner
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        shell: bash
        run: |
          dotnet tool update --global dotnet-sonarscanner --version 9.0.2 || \
          dotnet tool install --global dotnet-sonarscanner --version 9.0.2

      - name: Add .NET global tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore .NET packages
        run: dotnet restore HomeBudgetAccountingApi.sln

      - name: Make scanner script executable
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        run: chmod +x ./startsonar.sh

      - name: Start Sonar scan
        id: sonar-begin
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PULL_REQUEST_SOURCE_BRANCH: ${{ github.head_ref }}
          PULL_REQUEST_TARGET_BRANCH: ${{ github.base_ref }}
          OPENCOVER_REPORTS_PATH: artifacts/**/coverage.opencover.xml
          TEST_RESULTS_PATH: artifacts/**/*.trx
          SONAR_EXCLUSIONS: test-results/**,artifacts/**
          SONAR_COVERAGE_EXCLUSIONS: "**/Test[s]/**/*"
        shell: bash
        run: ./startsonar.sh

      - name: Build solution for Sonar analysis
        id: sonar-build
        run: dotnet build HomeBudgetAccountingApi.sln --configuration Release --no-restore --no-incremental

      - name: Merge API coverage reports
        id: merge-api-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/api-coverage

          reportgenerator \
            -reports:"artifacts/unit/HomeBudget.Accounting.Api.Tests/**/coverage.opencover.xml;artifacts/integration/HomeBudget.Accounting.Api.IntegrationTests/**/coverage.opencover.xml" \
            -targetdir:"test-results/api-coverage" \
            -reporttypes:"Cobertura;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/api-coverage/Cobertura.xml

      - name: Merge workers coverage reports
        id: merge-workers-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/workers-coverage

          reportgenerator \
            -reports:"artifacts/unit/HomeBudget.Components.Categories.Tests/**/coverage.opencover.xml;artifacts/unit/HomeBudget.Components.Operations.Tests/**/coverage.opencover.xml" \
            -targetdir:"test-results/workers-coverage" \
            -reporttypes:"Cobertura;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/workers-coverage/Cobertura.xml

      - name: Merge final coverage diagnostics
        id: merge-final-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/merged-coverage

          reportgenerator \
            -reports:"test-results/api-coverage/Cobertura.xml;test-results/workers-coverage/Cobertura.xml" \
            -targetdir:"test-results/merged-coverage" \
            -reporttypes:"Cobertura;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/merged-coverage/Cobertura.xml

      - name: Verify OpenCover paths for Sonar are local
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t opencover_reports < <(find artifacts -name 'coverage.opencover.xml' -print | sort)

          if [[ "${#opencover_reports[@]}" -eq 0 ]]; then
            echo 'No OpenCover reports were downloaded for Sonar.'
            exit 1
          fi

          if grep -q 'raw.githubusercontent.com' "${opencover_reports[@]}"; then
            echo 'OpenCover reports still contain SourceLink URLs.'
            exit 1
          fi

          printf 'Sample OpenCover source paths:\n'
          grep -h -o 'fullPath="[^"]*"' "${opencover_reports[@]}" | sed -n '1,10p'

      - name: Show merged coverage files
        shell: bash
        run: |
          set -euo pipefail
          printf 'Resolved OpenCover inputs for Sonar:\n'
          find artifacts -name 'coverage.opencover.xml' -print | sort
          printf '\nResolved merged coverage outputs:\n'
          find test-results -maxdepth 2 \( -name 'Cobertura.xml' -o -name 'Summary.txt' -o -name '*.trx' \) -print | sort

      - name: Upload merged quality diagnostics
        id: upload-diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: ci-merged-quality-results
          path: |
            test-results/
            artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: End Sonar scan
        id: sonar-end
        if: ${{ always() && steps.sonar-begin.outcome == 'success' }}
        shell: bash
        run: dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Collect step outcomes
        id: collect-status
        if: ${{ always() }}
        env:
          API_MERGE_OUTCOME: ${{ steps.merge-api-coverage.outcome }}
          WORKERS_MERGE_OUTCOME: ${{ steps.merge-workers-coverage.outcome }}
          FINAL_MERGE_OUTCOME: ${{ steps.merge-final-coverage.outcome }}
          DIAGNOSTICS_UPLOAD_OUTCOME: ${{ steps.upload-diagnostics.outcome }}
          SONAR_BEGIN_OUTCOME: ${{ steps.sonar-begin.outcome }}
          SONAR_BUILD_OUTCOME: ${{ steps.sonar-build.outcome }}
          SONAR_END_OUTCOME: ${{ steps.sonar-end.outcome }}
        shell: bash
        run: |
          opencover_inputs_exist="false"
          cobertura_report_exists="false"

          if find artifacts -name 'coverage.opencover.xml' -print -quit | grep -q .; then
            opencover_inputs_exist="true"
          fi

          if [[ -f "test-results/merged-coverage/Cobertura.xml" ]]; then
            cobertura_report_exists="true"
          fi

          echo "api_merge_outcome=${API_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "workers_merge_outcome=${WORKERS_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "final_merge_outcome=${FINAL_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "opencover_inputs_exist=${opencover_inputs_exist}" >> "$GITHUB_OUTPUT"
          echo "cobertura_report_exists=${cobertura_report_exists}" >> "$GITHUB_OUTPUT"
          echo "diagnostics_upload_outcome=${DIAGNOSTICS_UPLOAD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_begin_outcome=${SONAR_BEGIN_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_build_outcome=${SONAR_BUILD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_end_outcome=${SONAR_END_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"

  publish-ci-summary:
    name: Publish CI Summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - determine-sonar-mode
      - validate-application-build
      - run-unit-and-component-tests
      - run-api-integration-tests
      - analyze-master-quality
    steps:
      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## CI Master Summary"
            echo
            echo "- Sonar enabled: ${{ needs.determine-sonar-mode.outputs.sonar_enabled }}"
            echo "- Sonar reason: ${{ needs.determine-sonar-mode.outputs.sonar_reason }}"
            echo "- Restore: ${{ needs.validate-application-build.outputs.restore_outcome }}"
            echo "- Build validation: ${{ needs.validate-application-build.outputs.build_outcome }}"
            echo "- Unit and component tests: ${{ needs.run-unit-and-component-tests.outputs.tests_outcome }}"
            echo "- Unit diagnostics upload: ${{ needs.run-unit-and-component-tests.outputs.diagnostics_upload_outcome }}"
            echo "- Integration tests: ${{ needs.run-api-integration-tests.outputs.tests_outcome }}"
            echo "- Integration diagnostics upload: ${{ needs.run-api-integration-tests.outputs.diagnostics_upload_outcome }}"
            echo "- Analysis job result: ${{ needs.analyze-master-quality.result }}"
            echo "- API coverage merge: ${{ needs.analyze-master-quality.outputs.api_merge_outcome }}"
            echo "- Workers coverage merge: ${{ needs.analyze-master-quality.outputs.workers_merge_outcome }}"
            echo "- Final coverage merge: ${{ needs.analyze-master-quality.outputs.final_merge_outcome }}"
            echo "- OpenCover inputs present for Sonar: ${{ needs.analyze-master-quality.outputs.opencover_inputs_exist }}"
            echo "- Final Cobertura report present: ${{ needs.analyze-master-quality.outputs.cobertura_report_exists }}"
            echo "- Merged diagnostics upload: ${{ needs.analyze-master-quality.outputs.diagnostics_upload_outcome }}"
            echo "- Sonar begin: ${{ needs.analyze-master-quality.outputs.sonar_begin_outcome }}"
            echo "- Sonar build: ${{ needs.analyze-master-quality.outputs.sonar_build_outcome }}"
            echo "- Sonar end: ${{ needs.analyze-master-quality.outputs.sonar_end_outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
