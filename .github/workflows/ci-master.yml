name: CI Master

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-master-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: Allmantool_h-budget-accounting-api
  SONAR_PROJECT_NAME: h-budget-accounting-api
  SONAR_GITHUB_REPOSITORY: Allmantool/h-budget.HomeBudget.AccountingApi

jobs:
  determine-sonar-mode:
    name: Determine Sonar Mode
    runs-on: ubuntu-latest
    outputs:
      sonar_enabled: ${{ steps.mode.outputs.sonar_enabled }}
      sonar_reason: ${{ steps.mode.outputs.sonar_reason }}
    steps:
      - name: Resolve Sonar availability
        id: mode
        shell: bash
        run: |
          if [[ -n "${SONAR_TOKEN:-}" ]]; then
            echo "sonar_enabled=true" >> "$GITHUB_OUTPUT"
            echo "sonar_reason=SONAR_TOKEN is configured." >> "$GITHUB_OUTPUT"
          else
            echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
            echo "sonar_reason=SONAR_TOKEN is missing; CI will run without Sonar publishing." >> "$GITHUB_OUTPUT"
          fi

  validate-test-and-analyze:
    name: Restore, Build, Test, Merge Coverage, Sonar
    runs-on: ubuntu-latest
    needs: determine-sonar-mode
    outputs:
      restore_outcome: ${{ steps.collect-status.outputs.restore_outcome }}
      build_outcome: ${{ steps.collect-status.outputs.build_outcome }}
      api_tests_outcome: ${{ steps.collect-status.outputs.api_tests_outcome }}
      workers_tests_outcome: ${{ steps.collect-status.outputs.workers_tests_outcome }}
      api_merge_outcome: ${{ steps.collect-status.outputs.api_merge_outcome }}
      workers_merge_outcome: ${{ steps.collect-status.outputs.workers_merge_outcome }}
      final_merge_outcome: ${{ steps.collect-status.outputs.final_merge_outcome }}
      sonar_report_exists: ${{ steps.collect-status.outputs.sonar_report_exists }}
      cobertura_report_exists: ${{ steps.collect-status.outputs.cobertura_report_exists }}
      diagnostics_upload_outcome: ${{ steps.collect-status.outputs.diagnostics_upload_outcome }}
      sonar_begin_outcome: ${{ steps.collect-status.outputs.sonar_begin_outcome }}
      sonar_end_outcome: ${{ steps.collect-status.outputs.sonar_end_outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install coverage tooling
        shell: bash
        run: |
          dotnet tool update --global dotnet-reportgenerator-globaltool --version 5.5.1 || \
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.1

      - name: Install SonarScanner
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        shell: bash
        run: |
          dotnet tool update --global dotnet-sonarscanner --version 9.0.2 || \
          dotnet tool install --global dotnet-sonarscanner --version 9.0.2

      - name: Restore .NET packages
        id: restore
        run: dotnet restore HomeBudgetAccountingApi.sln

      - name: Make scanner script executable
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        run: chmod +x ./startsonar.sh

      - name: Start Sonar scan
        id: sonar-begin
        if: ${{ needs.determine-sonar-mode.outputs.sonar_enabled == 'true' }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PULL_REQUEST_SOURCE_BRANCH: ${{ github.head_ref }}
          PULL_REQUEST_TARGET_BRANCH: ${{ github.base_ref }}
          COVERAGE_FILE: test-results/merged-coverage/SonarQube.xml
          TEST_RESULTS_PATH: test-results/**/*.trx
          SONAR_EXCLUSIONS: test-results/**
          SONAR_COVERAGE_EXCLUSIONS: "**/Test[s]/**/*"
        shell: bash
        run: ./startsonar.sh

      - name: Build solution
        id: build
        run: dotnet build HomeBudgetAccountingApi.sln --configuration Release --no-restore --no-incremental

      - name: Prepare Docker host for integration tests
        id: prepare-docker
        shell: bash
        run: |
          docker system prune -af || true
          docker network prune -f || true

      - name: Run API tests with coverage
        id: api-tests
        timeout-minutes: 35
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/api

          dotnet test HomeBudget.Accounting.Api.Tests/HomeBudget.Accounting.Api.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Accounting.Api.Tests.trx" \
            --results-directory test-results/api/HomeBudget.Accounting.Api.Tests

          dotnet test HomeBudget.Accounting.Api.IntegrationTests/HomeBudget.Accounting.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Accounting.Api.IntegrationTests.trx" \
            --results-directory test-results/api/HomeBudget.Accounting.Api.IntegrationTests

      - name: Run workers tests with coverage
        id: workers-tests
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/workers

          dotnet test HomeBudget.Components.Categories.Tests/HomeBudget.Components.Categories.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Components.Categories.Tests.trx" \
            --results-directory test-results/workers/HomeBudget.Components.Categories.Tests

          dotnet test HomeBudget.Components.Operations.Tests/HomeBudget.Components.Operations.Tests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=HomeBudget.Components.Operations.Tests.trx" \
            --results-directory test-results/workers/HomeBudget.Components.Operations.Tests

      - name: Merge API coverage reports
        id: merge-api-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/api-coverage

          if ! find test-results/api -name 'coverage.cobertura.xml' -print -quit | grep -q .; then
            echo "::error::No API coverage files were found under test-results/api."
            exit 1
          fi

          reportgenerator \
            -reports:"test-results/api/**/coverage.cobertura.xml" \
            -targetdir:"test-results/api-coverage" \
            -reporttypes:"Cobertura;SonarQube;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/api-coverage/Cobertura.xml
          test -f test-results/api-coverage/SonarQube.xml

      - name: Merge workers coverage reports
        id: merge-workers-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/workers-coverage

          if ! find test-results/workers -name 'coverage.cobertura.xml' -print -quit | grep -q .; then
            echo "::error::No workers coverage files were found under test-results/workers."
            exit 1
          fi

          reportgenerator \
            -reports:"test-results/workers/**/coverage.cobertura.xml" \
            -targetdir:"test-results/workers-coverage" \
            -reporttypes:"Cobertura;SonarQube;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/workers-coverage/Cobertura.xml
          test -f test-results/workers-coverage/SonarQube.xml

      - name: Merge final coverage for Sonar
        id: merge-final-coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/merged-coverage

          reportgenerator \
            -reports:"test-results/api-coverage/Cobertura.xml;test-results/workers-coverage/Cobertura.xml" \
            -targetdir:"test-results/merged-coverage" \
            -reporttypes:"Cobertura;SonarQube;MarkdownSummary;TextSummary" \
            -verbosity:Info

          test -f test-results/merged-coverage/Cobertura.xml
          test -f test-results/merged-coverage/SonarQube.xml

      - name: Show merged coverage files
        id: verify-coverage
        shell: bash
        run: |
          set -euo pipefail
          printf 'Resolved coverage outputs:\n'
          find test-results -maxdepth 2 \( -name 'SonarQube.xml' -o -name 'Cobertura.xml' -o -name 'Summary.txt' -o -name '*.trx' \) -print | sort

      - name: Upload CI diagnostics
        id: upload-diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: ci-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: End Sonar scan
        id: sonar-end
        if: ${{ always() && steps.sonar-begin.outcome == 'success' }}
        shell: bash
        run: dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Collect step outcomes
        id: collect-status
        if: ${{ always() }}
        env:
          RESTORE_OUTCOME: ${{ steps.restore.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          API_TESTS_OUTCOME: ${{ steps.api-tests.outcome }}
          WORKERS_TESTS_OUTCOME: ${{ steps.workers-tests.outcome }}
          API_MERGE_OUTCOME: ${{ steps.merge-api-coverage.outcome }}
          WORKERS_MERGE_OUTCOME: ${{ steps.merge-workers-coverage.outcome }}
          FINAL_MERGE_OUTCOME: ${{ steps.merge-final-coverage.outcome }}
          DIAGNOSTICS_UPLOAD_OUTCOME: ${{ steps.upload-diagnostics.outcome }}
          SONAR_BEGIN_OUTCOME: ${{ steps.sonar-begin.outcome }}
          SONAR_END_OUTCOME: ${{ steps.sonar-end.outcome }}
        shell: bash
        run: |
          sonar_report_exists="false"
          cobertura_report_exists="false"

          if [[ -f "test-results/merged-coverage/SonarQube.xml" ]]; then
            sonar_report_exists="true"
          fi

          if [[ -f "test-results/merged-coverage/Cobertura.xml" ]]; then
            cobertura_report_exists="true"
          fi

          echo "restore_outcome=${RESTORE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "build_outcome=${BUILD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "api_tests_outcome=${API_TESTS_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "workers_tests_outcome=${WORKERS_TESTS_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "api_merge_outcome=${API_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "workers_merge_outcome=${WORKERS_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "final_merge_outcome=${FINAL_MERGE_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_report_exists=${sonar_report_exists}" >> "$GITHUB_OUTPUT"
          echo "cobertura_report_exists=${cobertura_report_exists}" >> "$GITHUB_OUTPUT"
          echo "diagnostics_upload_outcome=${DIAGNOSTICS_UPLOAD_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_begin_outcome=${SONAR_BEGIN_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"
          echo "sonar_end_outcome=${SONAR_END_OUTCOME:-skipped}" >> "$GITHUB_OUTPUT"

  publish-ci-summary:
    name: Publish CI Summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - determine-sonar-mode
      - validate-test-and-analyze
    steps:
      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## CI Master Summary"
            echo
            echo "- Sonar enabled: ${{ needs.determine-sonar-mode.outputs.sonar_enabled }}"
            echo "- Sonar reason: ${{ needs.determine-sonar-mode.outputs.sonar_reason }}"
            echo "- Restore: ${{ needs.validate-test-and-analyze.outputs.restore_outcome }}"
            echo "- Build: ${{ needs.validate-test-and-analyze.outputs.build_outcome }}"
            echo "- API tests: ${{ needs.validate-test-and-analyze.outputs.api_tests_outcome }}"
            echo "- Workers tests: ${{ needs.validate-test-and-analyze.outputs.workers_tests_outcome }}"
            echo "- API coverage merge: ${{ needs.validate-test-and-analyze.outputs.api_merge_outcome }}"
            echo "- Workers coverage merge: ${{ needs.validate-test-and-analyze.outputs.workers_merge_outcome }}"
            echo "- Final coverage merge: ${{ needs.validate-test-and-analyze.outputs.final_merge_outcome }}"
            echo "- Final Sonar coverage report present: ${{ needs.validate-test-and-analyze.outputs.sonar_report_exists }}"
            echo "- Final Cobertura report present: ${{ needs.validate-test-and-analyze.outputs.cobertura_report_exists }}"
            echo "- Final Sonar report path: test-results/merged-coverage/SonarQube.xml"
            echo "- Final Cobertura report path: test-results/merged-coverage/Cobertura.xml"
            echo "- Diagnostics upload: ${{ needs.validate-test-and-analyze.outputs.diagnostics_upload_outcome }}"
            echo "- Sonar begin: ${{ needs.validate-test-and-analyze.outputs.sonar_begin_outcome }}"
            echo "- Sonar end: ${{ needs.validate-test-and-analyze.outputs.sonar_end_outcome }}"
            echo "- Main analysis job result: ${{ needs.validate-test-and-analyze.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
